# fly.toml app configuration file generated for gamerobotfactory on 2026-07-19T12:49:51+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gamerobotfactory'
primary_region = 'nrt'

[build]
[env]
  GAMEROBOTFACTORY_DB_PATH = '/data/gamerobotfactory.sqlite3'
  RUST_LOG = 'info'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
